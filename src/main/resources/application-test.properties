spring.application.name=lotr-api-test
server.port=8081
server.servlet.context-path=/api

spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=false
spring.h2.console.enabled=false
spring.devtools.livereload.enabled=false
spring.devtools.restart.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
logging.level.org.hibernate.tool.schema.internal.ExceptionHandlerLoggedImpl=ERROR

lotr.token=dummy-token

jwt.secret=01234567890123456789012345678901
jwt.expiration=3600000